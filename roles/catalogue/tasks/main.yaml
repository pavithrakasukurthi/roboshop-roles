    - name: app setup
      ansible.builtin.import_role:
       name: common
       tasks_from: app-setup.yaml

    - name: installing nodejs
      ansible.builtin.import_role:
       name: common
       tasks_from: install-nodejs.yaml

    - name: copy mongo repo
      ansible.builtin.import_role:
       name: command
       tasks_from: copy-mongorepo.yaml

    - name: installing mongodb client
      ansible.builtin.package:
        name: mongodb-mongosh
        state: present

    - name: connecting to mongodb catalogue
      ansible.builtin.command: mongosh mongodb.pavithra.sbs --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output

    - name: loading products into db
      ansible.builtin.shell: mongosh --host mongodb.pavithra.sbs </app/db/master-data.js
      when: catalogue_output.stdout | int < 0

    - name: copying {{ component }} service
      ansible.builtin.import_role:
       name: common
       tasks_from: system-setup.yaml
