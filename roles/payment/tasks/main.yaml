
  - name: installing python tools
    ansible.builtin.dnf:
     name: "{{ item }}"
     state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: app setup
    ansible.builtin.import_role:
     name: common
     tasks_from: app-setup.yaml

  - name: installing dependencies
    ansible.builtin.pip:
     requirements: requirements.txt
     executable: pip3.9
    args:
     chdir: /app

  - name: copying service file
    ansible.builtin.import_role:
     name: common
     tasks_from: system-setup.yaml
    
