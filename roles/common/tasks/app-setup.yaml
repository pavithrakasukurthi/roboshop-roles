- name: creating roboshop system user
  ansible.builtin.user:
    name: roboshop
    system: yes
    shell: /sbin/nologin
    home: /app

- name: removing app directory
  ansible.builtin.file:
    path: /app
    state: absent

- name: creating app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: deleting {{ component }} zip file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent

- name: download shipping app code
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/s{{ component }}-v3.zip
    dest: /tmp/{{ component }}.zip

- name: extracting app code
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes