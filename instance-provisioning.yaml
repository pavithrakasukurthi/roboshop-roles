- name: creating instances and updating route53
  hosts: local
  connection: local
  
  vars:
   ami_id: ami-0220d79f3f480ecf5
   sg_id: sg-03b68898754661942
   zone_id: "Z0034753Q3D37U6HFEYZ"
   domain_name: "pavithra.sbs"
   instances: 
    - mongodb
    - catalogue
    - user
    - redis
    - cart
    - payment
    - frontend
    - shipping
    - mysql
    - rabbitmq
    

  tasks:
  - name: creating instances
    amazon.aws.ec2_instance:
     name: "{{ item }}"
     instance_type: t3.micro
     image_id: "{{ ami_id }}"
     security_group: "{{ sg_id }}"
     tags:
      Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output


  - name: print instance info
    ansible.builtin.debug:
     msg: "{{ ec2_output }}"

  - name: updating route53 records
    amazon.aws.route53: 
     state: present
     zone: "{{ domain_name }}"
     record: "{{ item.item }}.{{ domain_name }}"
     type: A 
     ttl: 1
     value: "{{ item.instances[0].private_ip_address }}"
     overwrite: true
    when: item.item != "frontend"
    loop: "{{ ec2_output.results }}"

  - name: create route53 record for frontend
    amazon.aws.route53:
     state: present
     zone: "{{ domain_name }}"
     record: "{{ domain_name }}"
     type: A 
     ttl: 1
     value: "{{ item.instances[0].public_ip_address }}"
     overwrite: true
    when: item.item == "frontend"
    loop: "{{ ec2_output.results }}"
    

